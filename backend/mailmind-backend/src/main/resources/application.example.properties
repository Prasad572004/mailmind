# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# For production, use a proper database like MySQL or PostgreSQL:
# spring.datasource.url=jdbc:mysql://localhost:3306/mailmind_db
# spring.datasource.username=your_db_username
# spring.datasource.password=your_db_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=your_jwt_secret_key_here_make_it_long_and_secure
jwt.expiration=86400000

# Google OAuth Configuration
google.client.id=your_google_client_id_here
google.client.secret=your_google_client_secret_here
google.redirect.uri=http://localhost:8080/auth/google/callback

# Gmail API Configuration
gmail.api.key=your_gmail_api_key_here
gmail.application.name=MailMind Backend

# AI Service Configuration (if using OpenAI or similar)
ai.api.key=your_ai_api_key_here
ai.model=gpt-3.5-turbo
ai.max.tokens=1000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Logging Configuration
logging.level.com.mailmind=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.file.name=logs/mailmind.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Security Configuration
security.cors.enabled=true
security.csrf.enabled=false

# Application Specific Properties
app.name=MailMind
app.version=1.0.0
app.description=AI-powered email management system

# Analytics Configuration
analytics.enabled=true
analytics.tracking.id=your_analytics_tracking_id

# Cache Configuration
spring.cache.type=simple

# Actuator Configuration (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always